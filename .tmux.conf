# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Upgrade $TERM
set -g default-terminal "tmux-256color"

# Pass Ctrl-/ through to the pane so Neovim's <C-/> comment mapping works.
# Ghostty (kitty-protocol terminal) sends Ctrl-/ as the legacy byte 0x1f, which
# tmux labels as C-_. Re-emit it as the logical C-/ key so tmux encodes it as
# the xterm modifyOtherKeys sequence Neovim reads as <C-/>.
unbind-key -T root C-/
bind-key -T root C-_ send-keys C-/
unbind C-b
set-option -g prefix C-t

# Focus events enabled for terminals that support them
set -g focus-events on
# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Option+1..9 -> switch to the Nth session (0-indexed: Option+1 = first session in `tmux ls`).
# Overrides tmux's default M-1..M-9 bindings, which run `switch-client -t <N>` (a session
# *named* N) and fail with "can't find session: N" when no session has that name.
# run-shell resolves the Nth session id dynamically; `##` keeps `#{session_id}` literal so the
# inner `tmux list-sessions` expands it per session.
bind-key -n M-1 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==1')"
bind-key -n M-2 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==2')"
bind-key -n M-3 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==3')"
bind-key -n M-4 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==4')"
bind-key -n M-5 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==5')"
bind-key -n M-6 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==6')"
bind-key -n M-7 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==7')"
bind-key -n M-8 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==8')"
bind-key -n M-9 run-shell "tmux switch-client -t $(tmux list-sessions -F '##{session_id}' | awk 'NR==9')"

set -g status on

# ── Status bar (doom-one colorscheme) ────────────────────────────────────────
set -g status-style          "bg=#1d2021,fg=#ebdbb2"
set -g status-position       top
set -g status-justify        centre

# Left: session name (yellow) + window tabs — style attrs split into separate #[...] tags
# to avoid commas inside the first #{W:} argument (tmux splits on the first comma it sees)
set -g status-left           "#[fg=#b8bb26,bg=#1d2021]\ue0b6#[fg=#1d2021,bg=#b8bb26,bold] #S #[fg=#b8bb26,bg=#1d2021,nobold]\ue0b4#[default] #{W:#[fg=#83a598]#[bg=#1d2021] #I:#W #[default],#[fg=#83a598,bg=#1d2021]\ue0b6#[fg=#1d2021,bg=#83a598,bold] #I:#W #[fg=#83a598,bg=#1d2021,nobold]\ue0b4#[default]}"
set -g status-left-length    200

# Center: empty (session name moved to status-left)
setw -g window-status-format         ""
setw -g window-status-current-format ""
setw -g window-status-separator      ""

# Right: folder (blue)  >  git branch (green clean / yellow dirty) — connected powerline segments, p10k-style
set -g status-right          "#(cd #{pane_current_path} && d=\$(basename \"\$PWD\"); st=\$(git status --porcelain 2>/dev/null); c=#b8bb26; echo \"\$st\" | grep -qE '^[^?]' && c=#fabd2f; b=\$(git branch --show-current 2>/dev/null); if [ -n \"\$b\" ]; then echo \"#[fg=#458588,bg=#1d2021]\ue0b6#[fg=#e4e4e4,bg=#458588] \uf07c \$d #[fg=#458588,bg=\$c]\ue0b0#[fg=#1d2021,bg=\$c] \uf126 \$b #[fg=\$c,bg=#1d2021]\ue0b0\"; else echo \"#[fg=#458588,bg=#1d2021]\ue0b6#[fg=#e4e4e4,bg=#458588] \uf07c \$d #[fg=#458588,bg=#1d2021]\ue0b0\"; fi)#[default]"
set -g status-right-length   120
# ─────────────────────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tmux-resurrect'
